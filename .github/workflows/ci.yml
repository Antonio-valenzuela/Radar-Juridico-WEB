name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      POSTGRES_USER: radar_ci
      POSTGRES_PASSWORD: ci-postgres-password-2026
      POSTGRES_DB: radar_ci
      REDIS_PASSWORD: ci-redis-password-2026
      DATABASE_URL: postgresql://radar_ci:ci-postgres-password-2026@127.0.0.1:5432/radar_ci?schema=public
      REDIS_URL: redis://:ci-redis-password-2026@127.0.0.1:6379/0
      ADMIN_TOKEN: 0123456789abcdef0123456789abcdef
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_ENABLE_PUBLIC_DEMO: "false"
      NEXT_TELEMETRY_DISABLED: "1"
      LLM_PROVIDER: local

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: radar_ci
          POSTGRES_PASSWORD: ci-postgres-password-2026
          POSTGRES_DB: radar_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U radar_ci -d radar_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-bookworm
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli --no-auth-warning -a ci-redis-password-2026 ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Enable and verify Redis authentication
        shell: bash
        run: |
          redis-cli CONFIG SET requirepass "$REDIS_PASSWORD"
          test "$(redis-cli --no-auth-warning -a "$REDIS_PASSWORD" ping)" = "PONG"
          set +e
          unauthenticated="$(redis-cli --raw ping 2>&1)"
          set -e
          test "$unauthenticated" != "PONG"

      - name: Apply database migrations
        run: npm run db:migrate

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Test suite
        run: npm test

      - name: Production build
        run: npm run build

      - name: Production dependency audit
        run: npm audit --omit=dev

      - name: Validate production Compose
        run: docker compose -f docker-compose.prod.yml config --quiet

      - name: Build production images
        run: |
          docker build --target web-runtime -t juridico-radar:web-ci .
          docker build --target worker-runtime -t juridico-radar:worker-ci .
          docker build --target migrate -t juridico-radar:migrate-ci .
