services:
  db:
    image: postgres:16
    container_name: juridico_db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: juridico
    ports:
      - "5432:5432"
    volumes:
      - juridico_db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: juridico_redis
    ports:
      - "6379:6379"

volumes:
  juridico_db_data:
